services:
  postgres:
    image: postgres:16-alpine
    container_name: codequest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: codequest
      POSTGRES_PASSWORD: codequest
      POSTGRES_DB: codequest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codequest -d codequest"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
